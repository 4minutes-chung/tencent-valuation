name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Run tests
        run: |
          PYTHONPATH=src python -m pytest -q
      - name: Prepare QA fixture data
        run: |
          mkdir -p data/raw/2026-02-18
          cat > data/raw/2026-02-18/tencent_financials.csv << 'EOF'
          asof,revenue_hkd_bn,ebit_margin,capex_pct_revenue,nwc_pct_revenue,dep_pct_revenue,net_cash_hkd_bn,shares_out_bn,current_price_hkd,fundamentals_method,fundamentals_source
          2026-02-18,700.0,0.36,0.09,0.02,0.03,110.0,9.0,300.0,ttm_4q_from_quarterly,override_csv
          EOF
          cat > data/raw/2026-02-18/segment_revenue.csv << 'EOF'
          period,segment,revenue_hkd_bn,total_revenue_hkd_bn,segment_source
          2026-02-18,VAS,230.0,700.0,override_csv
          2026-02-18,Marketing Services,150.0,700.0,override_csv
          2026-02-18,FinTech and Business Services,295.0,700.0,override_csv
          2026-02-18,Others,25.0,700.0,override_csv
          EOF
          cat > data/raw/2026-02-18/peer_fundamentals.csv << 'EOF'
          ticker,gross_debt_hkd_bn,interest_expense_hkd_bn_3y_avg,effective_tax_rate_3y_avg,shares_out_bn,source_doc,source_date,net_income_hkd_bn,book_value_hkd_bn,ebit_hkd_bn,fcf_hkd_bn,financial_currency,valuation_data_source,net_income_source,book_value_source,ebit_source,fcf_source
          9988.HK,170.0,7.0,0.18,22.97,ci_fixture,2026-02-18,80.0,900.0,110.0,50.0,CNY,ci_fixture,ci_fixture,ci_fixture,ci_fixture,ci_fixture
          3690.HK,120.0,6.0,0.19,6.43,ci_fixture,2026-02-18,30.0,200.0,40.0,20.0,CNY,ci_fixture,ci_fixture,ci_fixture,ci_fixture,ci_fixture
          9999.HK,90.0,4.0,0.21,2.88,ci_fixture,2026-02-18,35.0,160.0,38.0,45.0,CNY,ci_fixture,ci_fixture,ci_fixture,ci_fixture,ci_fixture
          9618.HK,110.0,5.0,0.20,4.55,ci_fixture,2026-02-18,28.0,220.0,38.0,10.0,CNY,ci_fixture,ci_fixture,ci_fixture,ci_fixture,ci_fixture
          9888.HK,95.0,4.3,0.19,5.13,ci_fixture,2026-02-18,5.0,260.0,9.0,-15.0,CNY,ci_fixture,ci_fixture,ci_fixture,ci_fixture,ci_fixture
          EOF
      - name: QA gate (no blocking failures)
        run: |
          python -m tencent_valuation_v4 run-all --asof 2026-02-18 --source-mode synthetic --refresh > /tmp/run-all.json
          python - << 'PY'
          import json
          from pathlib import Path
          qa_path = Path("reports/qa_2026-02-18.json")
          qa = json.loads(qa_path.read_text())
          non_blocking = {"backtest_quality_flag"}
          blocking = [
              c for c in qa.get("checks", [])
              if c.get("status") == "fail" and c.get("check") not in non_blocking
          ]
          if blocking:
              names = ", ".join(sorted({str(c.get("check")) for c in blocking}))
              raise SystemExit(f"Blocking QA failures: {names}")
          print(f"QA gate passed. warnings={qa['summary']['warnings']}, failures={qa['summary']['failures']}")
          PY
